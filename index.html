<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>AMWAJ & ELTIZAM Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; padding: 0; direction: rtl; }
    .container { max-width: 600px; margin: 5vh auto; background: white; padding: 30px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
    .logo-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
    .logo-bar img { max-height: 60px; max-width: 48%; object-fit: contain; }
    h2 { color: #333; margin-top: 10px; margin-bottom: 10px; }
    .result p { background: #e9f5e9; color: #2c3e50; padding: 10px; margin: 10px 0; border-radius: 8px; font-weight: bold; }
    .result .unit-number { background: #f5e1d4; color: #000; text-align: center; font-size: 18px; }
    .no-data { background: #fdecea; color: #c0392b; }
    button { background-color: #007bff; color: white; border: none; padding: 12px 20px; margin-top: 10px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; transition: 0.3s; }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    #loading::after { content: ''; display: inline-block; width: 16px; height: 16px; margin-right: 8px; border: 3px solid #007bff; border-top: 3px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    #auth-container { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; text-align: center; }
    #auth-container input { max-width: 300px; width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; text-align: center; }
  </style>
</head>

<body>

<div id="auth-container" class="container">
  <div class="logo-bar">
    <img src="https://github.com/Nour431998/unit-check/blob/main/Picture1.png?raw=true" alt="Logo 1" />
    <img src="https://github.com/Nour431998/unit-check/blob/main/Picture2.png?raw=true" alt="Logo 2" />
  </div>
  <h2>تسجيل الدخول</h2>
  <input type="email" id="email" placeholder="البريد الإلكتروني" />
  <input type="password" id="password" placeholder="كلمة المرور" />
  <p><a onclick="resetPassword()" style="color:#007bff; cursor:pointer;">نسيت كلمة السر؟</a></p>
  <button onclick="login()">دخول</button>
  <p id="auth-error" style="color: red;"></p>
</div>

<div id="main-container" style="display: none;">
  <div class="container">
    <div class="logo-bar">
      <img src="https://github.com/Nour431998/unit-check/blob/main/Picture1.png?raw=true" />
      <img src="https://github.com/Nour431998/unit-check/blob/main/Picture2.png?raw=true" />
    </div>

    <div id="selection-portal" style="padding: 20px 0;">
      <h2 style="color: #2c3e50; margin-bottom: 25px;">نظام الإدارة الموحد 2026</h2>
      <button onclick="activateAmwaj()" style="background-color: #2c3e50;">📊 فروق صيانة أمواج (Amwaj)</button>
      <button onclick="window.location.href='tickets.html'" style="background-color: #28a745;">🛠️ الطلبات المفتوحة (Eltizam)</button>
      <button onclick="logout()" style="background-color: #dc3545; margin-top: 40px; width: 60%; font-size: 14px;">🚪 تسجيل الخروج</button>
    </div>

    <div id="amwaj-app-section" style="display: none;">
      <h2 id="sheetTitle"><span id="loading">تحميل البيانات</span></h2>
      <div id="selectContainer"><select id="unitSelect"></select></div>
      <div class="result" id="resultContainer"></div>
      <button id="shareBtn" style="display:none; background-color:#28a745;">📥 مشاركة النتيجة</button>
      <button id="resetBtn" style="display: none; background-color: #007bff;">🔄 بحث عن وحدة جديدة</button>
      <button onclick="location.reload()" style="background-color: #6c757d; margin-top: 20px;">⬅️ العودة للقائمة</button>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBbqIcYOl_S8vOOK_Nxdf2FQbETE1pdSWw",
    authDomain: "unit-check-684a5.firebaseapp.com",
    projectId: "unit-check-684a5",
    storageBucket: "unit-check-684a5.appspot.com",
    messagingSenderId: "963222945184",
    appId: "1:963222945184:web:fe8f5aa1793228157fb8c5"
  };

  firebase.initializeApp(firebaseConfig);

  // --- وظائف التنقل ---
  function activateAmwaj() {
    document.getElementById("selection-portal").style.display = "none";
    document.getElementById("amwaj-app-section").style.display = "block";
    loadData(); 
  }

  // --- وظائف Firebase ---
  function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL)
      .then(() => firebase.auth().signInWithEmailAndPassword(email, password))
      .catch(error => document.getElementById("auth-error").textContent = "خطأ: " + error.message);
  }

  firebase.auth().onAuthStateChanged(user => {
    if (user) {
      document.getElementById("auth-container").style.display = "none";
      document.getElementById("main-container").style.display = "block";
    } else {
      document.getElementById("auth-container").style.display = "flex";
      document.getElementById("main-container").style.display = "none";
    }
  });

  function logout() {
    if(confirm("تسجيل خروج؟")) firebase.auth().signOut().then(() => location.reload());
  }

  // --- وظيفة تحميل بيانات أمواج (الأصلية) ---
  async function loadData() {
    const jsonUrl = "/.netlify/functions/gsheet";
    const unitSelect = document.getElementById("unitSelect");
    const resultContainer = document.getElementById("resultContainer");
    const titleEl = document.getElementById("sheetTitle");

    try {
      const res = await fetch(jsonUrl + "?units=1");
      const json = await res.json();
      titleEl.textContent = json.title || "MAINTENANCE";

      new TomSelect(unitSelect, {
        options: json.units.map(u => ({ value: u, text: u })),
        onChange: async (val) => {
          if(!val) return;
          resultContainer.innerHTML = "جاري التحميل...";
          const r = await fetch(jsonUrl + "?unit=" + encodeURIComponent(val));
          const j = await r.json();
          renderResult(j.data);
        }
      });
    } catch (e) { titleEl.textContent = "خطأ في الاتصال"; }
  }

  function renderResult(data) {
    const res = document.getElementById("resultContainer");
    res.innerHTML = `<p class="unit-number">وحدة: ${data.Unit}</p>`;
    ["status", "2023", "2024", "ملاحظات"].forEach(k => {
      res.innerHTML += `<p>${k}: ${data[k] || "لا يوجد"}</p>`;
    });
    document.getElementById("resetBtn").style.display = "block";
    document.getElementById("shareBtn").style.display = "block";
    document.getElementById("selectContainer").style.display = "none";
  }
</script>
</body>
</html>
